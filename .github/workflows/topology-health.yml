name: Topology Health Check

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  MKT_URL: https://global-washfriends-e2d4sutvaq-as.a.run.app

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run diagnostic health checks
        run: |
          python3 << 'PYEOF'
          import json, subprocess, ssl, socket, datetime, sys

          SERVICES = [
              ("mkt-backend",    "${{ env.MKT_URL }}/health",                                                "global-washfriends"),
              ("roi-backend",    "https://www.washfriendsglobal.com",                                        "washfriends-website"),
              ("sns-backend",    "https://washfriends-api-185931998309.asia-southeast1.run.app/health",       "washfriends-backend"),
              ("kiosk-backend",  "https://washfriends-kiosk-api-185931998309.asia-southeast1.run.app/health","kiosk-backend"),
              ("sns-frontend",   "https://washfriends-order.web.app",                                        "SNS 주문 폼"),
              ("kiosk-frontend", "https://gen-lang-client-0699748870.web.app",                               "키오스크 PWA"),
              ("samsung-web",    "https://www.samsung-laundry.com",                                          "samsung-laundry.com"),
          ]

          def check_ssl(hostname):
              try:
                  ctx = ssl.create_default_context()
                  with ctx.wrap_socket(socket.socket(), server_hostname=hostname) as s:
                      s.settimeout(8)
                      s.connect((hostname, 443))
                      cert = s.getpeercert()
                      exp = datetime.datetime.strptime(cert["notAfter"], "%b %d %H:%M:%S %Y %Z")
                      return (exp - datetime.datetime.utcnow()).days
              except Exception:
                  return None

          def diagnose(http, ms, ssl_days, svc_id):
              reason = ""
              action = ""

              if http == 0:
                  reason = f"서비스 응답 없음 (타임아웃). DNS 또는 네트워크 문제 가능성."
                  action = "Cloud Run 콘솔에서 서비스 상태 확인. 배포가 활성 상태인지 점검."
              elif 200 <= http < 400:
                  if ms > 3000:
                      reason = f"HTTP {http} 정상이지만 응답 {ms}ms로 매우 느림."
                      action = "Cold start 또는 리소스 부족. Cloud Run 인스턴스 min-instances 설정 검토."
                  elif ms > 1500:
                      reason = f"HTTP {http} 정상. 응답 {ms}ms로 다소 느림."
                      action = "모니터링 지속. 반복 시 메모리/CPU 할당량 점검."
                  else:
                      reason = f"HTTP {http}, 응답 {ms}ms. 정상 작동 중."
                      action = "조치 불필요."
              elif http == 404:
                  if svc_id == "mkt-backend":
                      reason = f"HTTP 404: /health 엔드포인트 응답 없음. 라우트 미등록 또는 배포 실패."
                      action = "FastAPI 앱에서 /health 라우트가 등록되어 있는지 확인. 최신 리비전 배포 상태 점검."
                  else:
                      reason = f"HTTP 404: 요청 경로를 찾을 수 없음. 서비스 루트 또는 health 엔드포인트 미구현."
                      action = "서비스 배포 상태 확인. 루트(/) 또는 /health 엔드포인트 존재 여부 확인."
              elif 400 <= http < 500:
                  reason = f"HTTP {http}: 클라이언트 오류. 인증 또는 요청 형식 문제."
                  action = "API 키, 인증 토큰, 요청 URL을 점검."
              elif 500 <= http < 600:
                  reason = f"HTTP {http}: 서버 내부 오류. 앱 크래시 또는 의존성 장애."
                  action = "Cloud Run 로그 확인 (gcloud logging read). 최근 배포 변경사항 롤백 검토."
              else:
                  reason = f"HTTP {http}: 예상치 못한 응답 코드."
                  action = "수동으로 URL 접속 테스트. 네트워크/프록시 설정 확인."

              if ssl_days is not None:
                  if ssl_days < 7:
                      reason += f" SSL 인증서 {ssl_days}일 후 만료 — 긴급!"
                      action += f" SSL 인증서 즉시 갱신 필요."
                  elif ssl_days < 30:
                      reason += f" SSL 인증서 {ssl_days}일 후 만료."
                      action += f" SSL 인증서 갱신 예약 권장."

              return reason.strip(), action.strip()

          results = {}
          checked = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")

          for svc_id, url, name in SERVICES:
              print(f"Checking {name} ({url})...")
              try:
                  r = subprocess.run(
                      ["curl", "-s", "-o", "/dev/null", "-w", "%{http_code}|%{time_total}", "--max-time", "12", url],
                      capture_output=True, text=True, timeout=15
                  )
                  parts = r.stdout.strip().split("|")
                  http = int(parts[0]) if parts[0].isdigit() else 0
                  ms = int(float(parts[1]) * 1000) if len(parts) > 1 else 0
              except Exception:
                  http, ms = 0, 0

              from urllib.parse import urlparse
              hostname = urlparse(url).hostname
              ssl_days = check_ssl(hostname) if hostname else None

              if 200 <= http < 400:
                  status = "good"
              elif 400 <= http < 500:
                  status = "warning"
              elif http == 0:
                  status = "critical"
              else:
                  status = "serious"

              reason, action = diagnose(http, ms, ssl_days, svc_id)

              results[svc_id] = {
                  "status": status,
                  "http": http,
                  "responseMs": ms,
                  "name": name,
                  "url": url,
                  "reason": reason,
                  "action": action,
              }
              if ssl_days is not None:
                  results[svc_id]["sslDaysLeft"] = ssl_days

              print(f"  -> {status} HTTP {http} {ms}ms")

          # ── Token health (fallback: assume permanent) ──
          token_health = {
              "fb-page-a": {"label": "FB Page A 토큰", "daysLeft": None, "cls": "ok", "note": "영구 토큰",
                            "reason": "Page Access Token은 만료되지 않는 영구 토큰입니다.", "action": "조치 불필요."},
              "fb-page-b": {"label": "FB Page B 토큰", "daysLeft": None, "cls": "ok", "note": "영구 토큰",
                            "reason": "Page Access Token은 만료되지 않는 영구 토큰입니다.", "action": "조치 불필요."},
              "zalo-oa":   {"label": "Zalo OA 토큰", "daysLeft": 60, "cls": "ok", "note": "60일 남음",
                            "reason": "Zalo OA 토큰은 자동 갱신 스케줄러(07:00 daily)로 관리됩니다.", "action": "ZaloTokenRefresh 스케줄러 작동 확인."},
          }
          results["token_health"] = token_health

          # ── Dispatch worker ──
          try:
              r2 = subprocess.run(
                  ["curl", "-s", "--max-time", "10", "${{ env.MKT_URL }}/health"],
                  capture_output=True, text=True, timeout=12
              )
              hj = json.loads(r2.stdout)
              results["dispatch_worker_ok"] = hj.get("dispatch_worker", False)
          except Exception:
              results["dispatch_worker_ok"] = False

          results["_meta"] = {"checked": checked, "runner": "github-actions"}

          with open("docs/status.json", "w", encoding="utf-8") as f:
              json.dump(results, f, ensure_ascii=False, indent=2)

          print("\n=== status.json written ===")
          print(json.dumps(results, ensure_ascii=False, indent=2)[:2000])
          PYEOF

      - name: Commit and push status
        run: |
          git config user.name "WashFriends Bot"
          git config user.email "bot@washfriends.com"
          git add docs/status.json
          git diff --cached --quiet || git commit -m "chore: topology health + diagnostics [skip ci]"
          git push
